<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Cipher Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* --- MATRIX CANVAS --- */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            display: block;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000000;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
        }

        /* --- CYBERPUNK MECHANICAL CASING --- */
        .calculator {
            position: relative;
            z-index: 1;
            background-color: #12151c;
            padding: 24px 20px;
            border-radius: 20px;
            border: 2px solid #06b6d4;
            box-shadow: 0px 0px 20px rgba(6, 182, 212, 0.3), inset 0px 0px 15px rgba(0, 0, 0, 0.8);
            width: 290px;
        }

        /* --- BRANDING (APEX - CIPHER) --- */
        .brand {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: #06b6d4;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 0px 0px 8px rgba(6, 182, 212, 0.8);
            border-bottom: 1px dashed rgba(6, 182, 212, 0.3);
            padding-bottom: 8px;
        }

        /* --- CRT DISPLAY SCREEN --- */
        #display {
            width: 100%;
            height: 70px;
            background-color: #090b0e;
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 8px;
            color: #06b6d4;
            font-family: 'Share Tech Mono', monospace;
            font-size: 2.2rem;
            text-align: right;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 25px;
            text-shadow: 0 0 5px rgba(6, 182, 212, 0.5);
            box-shadow: inset 0px 0px 10px rgba(0, 0, 0, 0.9);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* --- MECHANICAL KEYCAPS (3D Switch Effect) --- */
        button {
            height: 52px;
            font-size: 1.15rem;
            border: 1px solid #1a1d24;
            border-radius: 8px;
            cursor: pointer;
            background-color: #1f232e;
            color: #ffffff;
            font-weight: 700;
            position: relative;
            box-shadow: 0 4px 0 #0d0f14, inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.1s ease;
        }

        button:hover {
            background-color: #252a37;
            color: #06b6d4;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0d0f14, inset 0 1px 0 rgba(255,255,255,0.05);
        }

        /* Keycaps accent colors */
        .operator {
            color: #ff5e62;
            box-shadow: 0 4px 0 #9e3639, inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .operator:active {
            box-shadow: 0 1px 0 #9e3639;
        }

        .clear {
            color: #06b6d4;
            box-shadow: 0 4px 0 #047d91, inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .clear:active {
            box-shadow: 0 1px 0 #047d91;
        }

        .equal {
            background-color: #ff5e62;
            color: white;
            box-shadow: 0 4px 0 #9e3639, inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .equal:hover {
            background-color: #e54b50;
        }
        .equal:active {
            box-shadow: 0 1px 0 #9e3639;
        }

        /* --- SPARK EFFECT STYLE --- */
        .spark-particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="calculator">
        <div class="brand">𝓐𝓹𝓮𝔁 𝓒𝓲𝓹𝓱𝓮𝓻</div>
        
        <input type="text" id="display" readonly value="0">
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button class="operator" onclick="appendValue('*')">*</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('.')">.</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            
            <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
            <button class="equal" onclick="calculate()" style="grid-column: span 2;">=</button>
        </div>
    </div>

    <script>
        // --- MATRIX RAIN EFFECT ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = "ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ1234567890";
        const alphabet = chars.split("");

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        setInterval(drawMatrix, 30);


        // --- CALCULATOR LOGIC ---
        const display = document.getElementById('display');

        function appendValue(input) {
            if (display.value === '0' && input !== '.') {
                display.value = input;
            } else {
                display.value += input;
            }
        }

        function clearDisplay() {
            display.value = '0';
        }

        function calculate() {
            try {
                display.value = eval(display.value);
            } catch (error) {
                display.value = "Error";
            }
        }


        // --- DYNAMIC NEON SPARK EFFECT ---
        document.querySelector('.buttons').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                createSparks(e);
            }
        });

        function createSparks(e) {
            const button = e.target;
            const x = e.clientX;
            const y = e.clientY;

            // Alamin ang kulay base sa uri ng button
            let sparkColor = '#06b6d4'; // Default: Neon Cyan
            if (button.classList.contains('operator') || button.classList.contains('equal')) {
                sparkColor = '#ff5e62'; // Red/Coral para sa operators at equals
            }

            // Mag-generate ng 10 maliliit na spark particles kada click
            for (let i = 0; i < 10; i++) {
                const particle = document.createElement('div');
                particle.classList.add('spark-particle');
                document.body.appendChild(particle);

                // Random na laki ng bawat spark
                const size = Math.random() * 5 + 2; 
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.backgroundColor = sparkColor;
                particle.style.boxShadow = `0 0 8px ${sparkColor}, 0 0 12px ${sparkColor}`;

                // I-posisyon sa tapat ng click point
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;

                // Random na anggulo at distansya ng pagtilamsik
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 45 + 15;
                const destinationX = Math.cos(angle) * distance;
                const destinationY = Math.sin(angle) * distance;

                // Animate ng pagsabog palabas sabay fadeout
                particle.animate([
                    {
                        transform: 'translate(-50%, -50%) translate(0, 0) scale(1)',
                        opacity: 1
                    },
                    {
                        transform: `translate(-50%, -50%) translate(${destinationX}px, ${destinationY}px) scale(0)`,
                        opacity: 0
                    }
                ], {
                    duration: 400, // 0.4 seconds
                    easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)',
                    fill: 'forwards'
                });

                // Burahin sa DOM pagkatapos ng animation para iwas lag
                setTimeout(() => {
                    particle.remove();
                }, 400);
            }
        }
    </script>

</body>
</html>
